<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="mode-selector">
            <button class="mode-btn" id="white-mode">White Mode</button>
            <button class="mode-btn" id="black-mode">Black Mode</button>
        </div>
        <h1>Lotto Number Generator</h1>
        
        <div class="character-image">
            <img src="https://static.wikia.nocookie.net/eldenring/images/d/df/ER_Elemer_of_the_Briar.png" alt="Elemer of the Briar">
        </div>

        <div class="lotto-numbers">
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
        </div>
        <button id="generate-btn">Generate Numbers</button>
    </div>
    <script src="main.js"></script>
</body>
</html>
