<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-nav">
        <div class="nav-left">
            <a href="https://www.ilbe.com" target="_blank" class="nav-link">일간베스트</a>
            <a href="https://www.naver.com" target="_blank" class="nav-link">네이버</a>
            <a href="https://namu.wiki" target="_blank" class="nav-link">나무위키</a>
            <a href="https://gemini.google.com" target="_blank" class="nav-link">제미니</a>
            <a href="https://chatgpt.com" target="_blank" class="nav-link">ChatGPT</a>
            <a href="https://claude.ai" target="_blank" class="nav-link">Claude</a>
            <a href="https://www.dcinside.com" target="_blank" class="nav-link">디시인사이드</a>
            <a href="https://firebase.google.com" target="_blank" class="nav-link">Firebase</a>
            <a href="https://www.cloudflare.com" target="_blank" class="nav-link">Cloudflare</a>
        </div>
        <div class="nav-right">
            <a href="https://arena.ai/" target="_blank" class="nav-link">Arena AI</a>
            <a href="https://geminicli.com" target="_blank" class="nav-link">Gemini CLI</a>
            <a href="https://www.youtube.com" target="_blank" class="nav-link">유튜브</a>
        </div>
    </header>

    <div class="mode-selector">
        <button class="mode-btn" id="white-mode">White Mode</button>
        <button class="mode-btn" id="black-mode">Black Mode</button>
    </div>

    <div class="main-wrapper">
        <aside class="side-panel left-panel">
            <h2>오늘의 명언</h2>
            <div id="quote-display" class="display-box">번호를 생성하여 명언을 확인하세요.</div>
            <div class="side-image-container">
                <img id="quote-img" src="" alt="" style="display: none;">
                <p id="quote-name" class="char-name"></p>
            </div>
        </aside>

        <div class="container">
            <h1>Lotto Number Generator</h1>
            <div class="character-image">
                <img src="lotto-balls.svg" alt="5 Lotto Balls">
            </div>
            <div class="lotto-numbers">
                <span class="number"></span>
                <span class="number"></span>
                <span class="number"></span>
                <span class="number"></span>
                <span class="number"></span>
                <span class="number"></span>
            </div>
            <button id="generate-btn">Generate Numbers</button>
        </div>

        <aside class="side-panel right-panel">
            <h2>오늘의 운세</h2>
            <div id="fortune-display" class="display-box">번호를 생성하여 운세를 확인하세요.</div>
            <div class="side-image-container">
                <img id="fortune-img" src="" alt="" style="display: none;">
                <p id="fortune-name" class="char-name"></p>
            </div>
        </aside>
    </div>
    <section class="contact-section">
        <div class="contact-container">
            <h2>고객 상담 및 문의</h2>
            <form action="https://formspree.io/f/mbdavqlk" method="POST" id="contact-form">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" placeholder="성함을 입력해주세요" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="_replyto" placeholder="답변받을 이메일을 입력해주세요" required>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="5" placeholder="상담 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
            <div id="form-status"></div>
        </div>
    </section>

    <section class="comments-section">
        <div class="comments-container">
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */

                var disqus_config = function () {
                this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                */
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://https-pro-c-c-1-73620043-38697-web-app.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </section>

    <script src="main.js"></script>
</body>
</html>
